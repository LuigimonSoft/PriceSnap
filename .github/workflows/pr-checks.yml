name: PR Checks

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve available iOS simulator
        run: |
          SIMULATOR_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys

          devices = json.load(sys.stdin).get('devices', {})
          candidates = []
          for runtime, items in devices.items():
              if 'iOS' not in runtime:
                  continue
              for item in items:
                  if not item.get('isAvailable'):
                      continue
                  name = item.get('name', '')
                  if not name.startswith('iPhone'):
                      continue
                  candidates.append((runtime, name, item.get('udid', '')))

          if not candidates:
              raise SystemExit('No available iPhone simulators found')

          def sort_key(entry):
              runtime, name, _ = entry
              version = runtime.rsplit('.', 1)[-1].replace('-', '.')
              parts = []
              for token in version.split('.'):
                  parts.append(int(token) if token.isdigit() else 0)
              return (parts, name)

          print(sorted(candidates, key=sort_key, reverse=True)[0][2])
          ")

          echo "Using simulator UDID: ${SIMULATOR_UDID}"
          echo "IOS_SIMULATOR_DESTINATION=id=${SIMULATOR_UDID}" >> "$GITHUB_ENV"

      - name: Build app
        run: |
          xcodebuild \
            -project PriceSnap.xcodeproj \
            -scheme PriceSnap \
            -destination 'generic/platform=iOS Simulator' \
            clean build

      - name: Run tests and report coverage when test targets exist
        run: |
          HAS_TEST_TARGETS=$(xcodebuild -list -json -project PriceSnap.xcodeproj | python3 -c "import json,sys; d=json.load(sys.stdin); t=d.get('project',{}).get('targets',[]); print('true' if any(x.endswith('Tests') for x in t) else 'false')")

          if [ "$HAS_TEST_TARGETS" = "true" ]; then
            xcodebuild \
              -project PriceSnap.xcodeproj \
              -scheme PriceSnap \
              -destination "$IOS_SIMULATOR_DESTINATION" \
              -enableCodeCoverage YES \
              -resultBundlePath TestResults.xcresult \
              test

            COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult | python3 -c "import json,sys; r=json.load(sys.stdin); print(f'{(r.get(\"lineCoverage\",0)*100):.2f}')")
            echo "Code coverage: ${COVERAGE}%"
            echo "### Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "- Total line coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test targets found. Build check completed successfully."
            echo "### Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "- No test targets found, coverage not available." >> "$GITHUB_STEP_SUMMARY"
          fi
