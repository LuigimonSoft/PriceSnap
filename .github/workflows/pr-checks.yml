name: PR Checks

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app
        run: |
          xcodebuild \
            -project PriceSnap.xcodeproj \
            -scheme PriceSnap \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            clean build

      - name: Run tests when test targets exist
        run: |
          HAS_TEST_TARGETS=$(xcodebuild -list -json -project PriceSnap.xcodeproj | python3 -c "import json,sys; d=json.load(sys.stdin); t=d.get('project',{}).get('targets',[]); print('true' if any(x.endswith('Tests') for x in t) else 'false')")

          if [ "$HAS_TEST_TARGETS" = "true" ]; then
            xcodebuild \
              -project PriceSnap.xcodeproj \
              -scheme PriceSnap \
              -destination 'platform=iOS Simulator,name=iPhone 16' \
              test
          else
            echo "No test targets found. Build check completed successfully."
          fi
